<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PDF Logo Overlay MVP</title>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 40px; }
    #drop { border: 2px dashed #aaa; padding: 40px; text-align: center; }
    #drop.drag { border-color: #000; }
  </style>
</head>
<body>

<h2>Upload PDF</h2>
<div id="drop">Drag & drop PDF here</div>

<script>
const drop = document.getElementById("drop");

drop.addEventListener("dragover", e => {
  e.preventDefault();
  drop.classList.add("drag");
});

drop.addEventListener("dragleave", () => drop.classList.remove("drag"));

drop.addEventListener("drop", async e => {
  e.preventDefault();
  drop.classList.remove("drag");

  const file = e.dataTransfer.files[0];
  if (!file || file.type !== "application/pdf") {
    alert("Please drop a PDF");
    return;
  }

  const pdfBytes = await file.arrayBuffer();
  const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);

  // Load logo (PNG or JPG)
  const logoBytes = await fetch("./logo.png").then(r => r.arrayBuffer());
  const logo = await pdfDoc.embedPng(logoBytes);

  const pages = pdfDoc.getPages();

  pages.forEach(page => {
    const { width, height } = page.getSize();
    const logoWidth = 100;
    const logoHeight = logoWidth * (logo.height / logo.width);

    page.drawImage(logo, {
      x: width - logoWidth - 20,
      y: height - logoHeight - 20,
      width: logoWidth,
      height: logoHeight
    });
  });

  const out = await pdfDoc.save();
  download(out, "output.pdf");
});

function download(bytes, filename) {
  const blob = new Blob([bytes], { type: "application/pdf" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}
</script>

</body>
</html>
